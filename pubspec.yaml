name: expense_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  supabase_flutter: ^2.8.3
  dio: ^5.8.0+1
  get_it: ^8.0.3
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  fpdart: ^1.1.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.10
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.2.0
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1
  flutter_sms_inbox: ^1.0.5
  connectivity_plus: ^6.0.3
  fl_chart: ^1.2.0
  lottie: ^3.3.3
  audioplayers: ^6.0.0
  shared_preferences: ^2.5.5
  pdf: ^3.12.0
  path_provider: ^2.1.6
  file_picker: 8.1.7
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logos/app_final_native_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#4f378a"
  image: "assets/images/logos/app_final_splash_logo.png"
  android_12:
    image: "assets/images/logos/app_final_splash_logo.png"
    color: "#4f378a"
  android_gravity: center
  ios_content_mode: center
  web: false

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/components/
    - assets/images/logos/
    - assets/images/expense_types/
    - assets/sound_effects/
    - assets/animations/
    - assets/fonts/
