name: expense_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  supabase_flutter: ^2.8.3
  dio: ^5.8.0+1
  get_it: ^8.0.3
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  fpdart: ^1.1.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.10
  google_sign_in: ^6.2.2
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logos/app_native_icon_primary.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logos/app_logo.png"
  android_12:
    image: "assets/images/logos/app_logo_primary.png" 
    color: "#ffffff"
  android_gravity: center
  ios_content_mode: center
  web: false

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/components/
    - assets/images/logos/
